<style>
:root {
  --bg: #0d0f14;
  --surface: #161920;
  --surface2: #1e2230;
  --surface3: #262b3d;
  --border: #2a2f42;
  --border2: #343a52;
  --text: #e8eaf0;
  --text2: #9095a8;
  --text3: #5a6075;
  --accent: #4f7bff;
  --accent2: #6b8fff;
  --red: #ff4d4d;
  --red-bg: rgba(255,77,77,.12);
  --orange: #ff8c42;
  --orange-bg: rgba(255,140,66,.12);
  --yellow: #ffc045;
  --yellow-bg: rgba(255,192,69,.1);
  --green: #3ddc84;
  --green-bg: rgba(61,220,132,.1);
  --blue: #4f7bff;
  --blue-bg: rgba(79,123,255,.1);
  --gray-bg: rgba(144,149,168,.08);
  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 2px 8px rgba(0,0,0,.4);
}
/* ── LIGHT MODE ─────────────────────────────── */
body.light {
  --bg: #f4f5f8;
  --surface: #ffffff;
  --surface2: #f0f1f5;
  --surface3: #e6e8ef;
  --border: #dde0ea;
  --border2: #c8ccda;
  --text: #1a1d2e;
  --text2: #4a4f6a;
  --text3: #8890a8;
  --accent: #3b6ae8;
  --accent2: #5480f0;
  --red: #e03030;
  --red-bg: rgba(224,48,48,.1);
  --orange: #d96b1a;
  --orange-bg: rgba(217,107,26,.1);
  --yellow: #b38800;
  --yellow-bg: rgba(179,136,0,.1);
  --green: #1a9e5c;
  --green-bg: rgba(26,158,92,.1);
  --blue: #3b6ae8;
  --blue-bg: rgba(59,106,232,.1);
  --gray-bg: rgba(74,79,106,.06);
  --shadow: 0 2px 8px rgba(0,0,0,.08);
}
body.light select option { background: #ffffff; color: #1a1d2e; }
body.light .tbl tr:hover td { background: rgba(0,0,0,.02); }
body.light .modal { box-shadow: 0 24px 80px rgba(0,0,0,.15); }
body.light ::-webkit-scrollbar-thumb { background: var(--border2); }
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
.card{box-shadow:var(--shadow)}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);outline:none;width:100%;font-family:'Inter',sans-serif;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,123,255,.15)}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface2)}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:all .15s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes barFill{from{width:0}to{width:var(--w)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .3s ease both}
.pulse{animation:pulse 2s ease infinite}

/* Layout */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.page{padding:24px;flex:1}

/* Sidebar */
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sidebar-logo .brand{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.sidebar-logo .sub{font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.nav-section{padding:12px 10px 4px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;margin:1px 8px;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--accent);font-weight:600}
.nav-item .icon{width:16px;text-align:center;font-size:14px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;font-family:'IBM Plex Mono',monospace}
.nav-badge.warn{background:var(--orange)}
.sidebar-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--surface2)}
.user-avatar{width:28px;height:28px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* Cards & surfaces */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi .kpi-label{font-size:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px}
.kpi .kpi-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1;margin-bottom:4px}
.kpi .kpi-sub{font-size:11px;color:var(--text3)}
.kpi.danger{border-color:rgba(255,77,77,.3);background:linear-gradient(135deg,var(--surface) 0%,rgba(255,77,77,.04) 100%)}
.kpi.danger .kpi-val{color:var(--red)}
.kpi.warn{border-color:rgba(255,140,66,.3);background:linear-gradient(135deg,var(--surface) 0%,rgba(255,140,66,.04) 100%)}
.kpi.warn .kpi-val{color:var(--orange)}
.kpi.ok{border-color:rgba(61,220,132,.2)}
.kpi.ok .kpi-val{color:var(--green)}
.kpi.info .kpi-val{color:var(--accent)}

/* Priority badges */
.pri{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.pri.critical{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,77,77,.25)}
.pri.thisweek{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(255,140,66,.25)}
.pri.queued{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(255,192,69,.25)}
.pri.backlog{background:var(--gray-bg);color:var(--text3);border:1px solid var(--border)}

/* Status badges */
.status{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
.status.todo{background:var(--gray-bg);color:var(--text2)}
.status.inprogress{background:var(--blue-bg);color:var(--accent)}
.status.done{background:var(--green-bg);color:var(--green)}
.status.waiting{background:var(--yellow-bg);color:var(--yellow)}
.status.blocked{background:var(--red-bg);color:var(--red)}
.status.overdue{background:var(--red-bg);color:var(--red)}

/* Project type badges */
.type-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;white-space:nowrap}
.type-IC{background:rgba(107,143,255,.15);color:#6b8fff;border:1px solid rgba(107,143,255,.2)}
.type-Permit{background:rgba(255,140,66,.12);color:var(--orange);border:1px solid rgba(255,140,66,.2)}
.type-Binder{background:rgba(61,220,132,.1);color:var(--green);border:1px solid rgba(61,220,132,.2)}
.type-Revision{background:rgba(255,192,69,.1);color:var(--yellow);border:1px solid rgba(255,192,69,.2)}

/* Risk indicator */
.risk{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
.risk.atrisk{background:var(--red-bg);color:var(--red)}
.risk.stalled{background:var(--orange-bg);color:var(--orange)}
.risk.ontrack{background:var(--green-bg);color:var(--green)}
.risk.onhold{background:var(--gray-bg);color:var(--text3)}

/* Workload bar */
.wl-bar-bg{background:var(--surface3);border-radius:999px;height:6px;overflow:hidden;flex:1}
.wl-bar-fill{height:100%;border-radius:999px;transition:width .6s ease}
.wl-green{background:var(--green)}
.wl-yellow{background:var(--yellow)}
.wl-orange{background:var(--orange)}
.wl-red{background:var(--red)}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:8px 12px;text-align:left;font-size:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}

/* Task card */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;flex-direction:column;gap:7px;transition:border-color .15s,transform .15s}
.task-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.task-card.overdue-card{border-color:rgba(255,77,77,.3);background:linear-gradient(135deg,var(--surface) 0%,rgba(255,77,77,.03) 100%)}
.task-card.blocked-card{border-color:rgba(255,140,66,.3)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,77,77,.2)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-icon{padding:6px;border-radius:6px;background:transparent;color:var(--text3);width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Form */
.form-row{display:grid;gap:12px;margin-bottom:14px}
.form-col{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.5px}

/* Alert bar */
.alert-bar{background:linear-gradient(90deg,rgba(255,77,77,.15),rgba(255,77,77,.05));border-bottom:1px solid rgba(255,77,77,.2);padding:8px 24px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--red)}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}

/* Section title */
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title .count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);font-weight:400}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty .empty-icon{font-size:32px;margin-bottom:8px;opacity:.4}
.empty p{font-size:13px}

/* Topbar search */
.topbar-search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--text);width:220px;outline:none}
.topbar-search:focus{border-color:var(--accent)}
.topbar-search::placeholder{color:var(--text3)}

/* Tooltips / hover info */
.tag{display:inline-block;background:var(--surface3);color:var(--text2);border-radius:4px;padding:1px 6px;font-size:11px;font-family:'IBM Plex Mono',monospace}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px}
.tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border:none;background:transparent;transition:all .15s}
.tab.active{background:var(--surface3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* Owner chip */
.owner-chip{display:inline-flex;align-items:center;gap:5px;padding:2px 8px 2px 4px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.owner-dot{width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
/* Theme toggle */
.theme-toggle{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all .15s;width:100%;margin-bottom:6px}
.theme-toggle:hover{background:var(--surface3)}
.theme-toggle-track{width:28px;height:16px;border-radius:999px;background:var(--border2);position:relative;flex-shrink:0;transition:background .2s}
.theme-toggle-track.on{background:var(--accent)}
.theme-toggle-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:999px;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.theme-toggle-track.on .theme-toggle-thumb{transform:translateX(12px)}
</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ═══════════════════════════════════════════════════════════
   CONSTANTS & HELPERS
═══════════════════════════════════════════════════════════ */
const FIREBASE_PATHS={tasks:"v2_tasks",projects:"v2_projects",team:"team",announcements:"announcements",pending:"pending",archived:"v2_archived"};

const CAPACITY_HOURS_WEEK=37.5;
const STALLED_DAYS=4;
const OVERDUE_WARN_DAYS=2;

// Helpers
const todayStr=()=>new Date().toISOString().split("T")[0];
const genId=()=>"id_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtDate=d=>{if(!d||d==="—")return"—";try{return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}catch{return d}};
const fmtDateFull=d=>{if(!d)return"—";try{return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}catch{return d}};
const fmtTS=ts=>ts?new Date(ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"";
const daysDiff=(dateStr,from=null)=>{
  if(!dateStr)return null;
  const a=new Date((from||todayStr())+"T12:00:00");
  const b=new Date(dateStr+"T12:00:00");
  return Math.round((b-a)/(1000*60*60*24));
};
const isOverdue=(task)=>task.status!=="done"&&task.dueDate&&daysDiff(task.dueDate)<0;
const isAtRiskDate=(task)=>task.status!=="done"&&task.dueDate&&daysDiff(task.dueDate)<=1&&daysDiff(task.dueDate)>=0;
const daysSinceActivity=(ts)=>ts?Math.floor((Date.now()-ts)/(1000*60*60*24)):999;

// Workload calc
const calcWorkload=(tasks,memberId)=>{
  const active=tasks.filter(t=>t.owner===memberId&&t.status!=="done");
  const hrs=active.reduce((s,t)=>s+(t.estimatedHours||0),0);
  const pct=Math.min(100,Math.round(hrs/CAPACITY_HOURS_WEEK*100));
  const level=hrs<=20?"green":hrs<=30?"yellow":hrs<=40?"orange":"red";
  return{hrs,pct,level,count:active.length};
};

// Project risk calc
const calcProjectRisk=(project,tasks)=>{
  const ptasks=tasks.filter(t=>t.projectId===project.id&&t.status!=="done");
  if(!ptasks.length)return"ontrack";
  const hasOverdue=ptasks.some(t=>isOverdue(t));
  const hasBlocked=ptasks.some(t=>t.status==="blocked");
  const stalled=project.lastActivity&&daysSinceActivity(project.lastActivity)>STALLED_DAYS&&ptasks.some(t=>t.status==="inprogress"||t.status==="todo");
  if(hasOverdue||hasBlocked)return"atrisk";
  if(stalled)return"stalled";
  return"ontrack";
};

function ProjectFormModal({team,onSave,onClose,editProject=null}){
  const drafters=team.filter(m=>m.group==="drafting");
  const designers=team.filter(m=>m.group==="design");

  const [form,setForm]=useState(editProject?{...editProject}:{
    name:"",address:"",type:"Binder",status:"Active",
    draftOwner:"",designOwner:"",
    primaryOwner:"", // kept for backward compat, mirrors draftOwner
    notes:"",startDate:todayStr(),targetDate:"",knackLink:""
  });
  const [tasks,setTasks]=useState([]);
  const [useTemplate,setUseTemplate]=useState(!editProject);
  const [selectedTasks,setSelectedTasks]=useState({});

  // Use address as project name automatically
  useEffect(()=>{
    if(!editProject&&form.address&&!form._nameTouched){
      setForm(f=>({...f,name:form.address}));
    }
  },[form.address]);

  useEffect(()=>{
    if(!editProject&&useTemplate&&form.type){
      const tpl=TEMPLATES[form.type]||[];
      setTasks(tpl);
      const sel={};tpl.forEach((t,i)=>{sel[i]=!t.optional;});
      setSelectedTasks(sel);
    }
  },[form.type,useTemplate]);

  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const setAddr=e=>{
    const v=e.target.value;
    setForm(f=>({...f,address:v,name:v}));
  };
  const valid=form.address.trim()&&(form.draftOwner||form.designOwner);

  const handleSave=()=>{
    if(!valid)return;
    const project={
      ...form,
      name:form.address, // address IS the project name
      primaryOwner:form.draftOwner||form.designOwner, // backward compat
      id:editProject?.id||genId(),
      createdAt:editProject?.createdAt||Date.now(),
      lastActivity:Date.now()
    };
    const taskList=useTemplate&&!editProject?tasks.filter((_,i)=>selectedTasks[i]).map((t,i)=>{
      // Assign drafter tasks to draftOwner, designer tasks to designOwner
      const owner=t.ownerRole==="designer"
        ?(form.designOwner||form.draftOwner)
        :(form.draftOwner||form.designOwner);
      return{
        id:genId(),projectId:project.id,title:t.name,stage:t.stage,
        owner,ownerRole:t.ownerRole||"drafter",
        status:t.defaultStatus||"todo",priority:"queued",
        estimatedHours:t.hours,placeholder:t.placeholder||false,
        dueDate:"",startDate:"",notes:"",createdAt:Date.now(),order:i,
      };
    }):[];
    onSave(project,taskList);
  };

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:620}}>
        <div className="modal-header">
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:700}}>{editProject?"Edit Project":"New Project"}</div>
          <button className="btn-icon" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <FormRow cols={1}>
            <FormCol label="Property Address (used as project name)">
              <input value={form.address} onChange={setAddr} placeholder="1812 Highland Drive, Newport Beach CA 92660"/>
            </FormCol>
          </FormRow>
          <FormRow cols={3}>
            <FormCol label="Type">
              <select value={form.type} onChange={set("type")}>{PROJECT_TYPES.map(t=><option key={t}>{t}</option>)}</select>
            </FormCol>
            <FormCol label="Status">
              <select value={form.status} onChange={set("status")}>{PROJECT_STATUSES.map(s=><option key={s}>{s}</option>)}</select>
            </FormCol>
            <FormCol label="Market / Notes">
              <input value={form.market||""} onChange={set("market")} placeholder="Orange County, LA…"/>
            </FormCol>
          </FormRow>

          {/* Dual owner row */}
          <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text3)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:10}}>Project Team</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FormCol label="Drafter">
                <select value={form.draftOwner||""} onChange={set("draftOwner")}>
                  <option value="">— Select drafter —</option>
                  {drafters.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
              </FormCol>
              <FormCol label="Interior Designer">
                <select value={form.designOwner||""} onChange={set("designOwner")}>
                  <option value="">— Select designer —</option>
                  {designers.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                </select>
              </FormCol>
            </div>
          </div>

          <FormRow cols={2}>
            <FormCol label="Start Date"><input type="date" value={form.startDate} onChange={set("startDate")}/></FormCol>
            <FormCol label="Target Completion (COE)"><input type="date" value={form.targetDate} onChange={set("targetDate")}/></FormCol>
          </FormRow>
          <FormRow cols={1}>
            <FormCol label="Knack Link (optional)"><input value={form.knackLink||""} onChange={set("knackLink")} placeholder="https://truelegacyhomes.knack.com/..."/></FormCol>
          </FormRow>
          <FormRow cols={1}>
            <FormCol label="Notes"><textarea value={form.notes||""} onChange={set("notes")} placeholder="Budget, context, special notes…" rows={2} style={{resize:"vertical"}}/></FormCol>
          </FormRow>

              </div>
              {useTemplate&&tasks.length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:4,background:"var(--surface2)",borderRadius:10,padding:12}}>
                  {tasks.map((t,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 4px"}}>
                      <input type="checkbox" checked={!!selectedTasks[i]} onChange={e=>{const s={...selectedTasks};s[i]=e.target.checked;setSelectedTasks(s);}} style={{width:14,height:14,accentColor:"var(--accent)",flexShrink:0}}/>
                      <span style={{flex:1,fontSize:12,color:t.placeholder?"var(--text3)":"var(--text)",fontStyle:t.placeholder?"italic":"normal"}}>{t.name}</span>
                      <span style={{fontSize:10,color:"var(--text3)",fontFamily:"'IBM Plex Mono',monospace"}}>{t.hours}h</span>
                      <span className="tag">{t.stage}</span>
                      <span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:t.ownerRole==="designer"?"var(--blue-bg)":"var(--orange-bg)",color:t.ownerRole==="designer"?"var(--accent)":"var(--orange)",fontFamily:"'IBM Plex Mono',monospace"}}>
                        {t.ownerRole==="designer"?"Designer":"Drafter"}
                      </span>
                      {t.placeholder&&<span style={{fontSize:10,color:"var(--yellow)"}}>placeholder</span>}
                      {t.optional&&<span style={{fontSize:10,color:"var(--text3)"}}>optional</span>}
                    </div>
                  ))}
                  <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid var(--border)",fontSize:11,color:"var(--text3)"}}>
                    Total: <b style={{color:"var(--text)"}}>{tasks.filter((_,i)=>selectedTasks[i]).reduce((s,t)=>s+t.hours,0)}h</b> estimated
                  </div>
                </div>
              )}
            </>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!valid} style={{opacity:valid?1:.4}}>
            {editProject?"Save Changes":"Create Project"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MANAGEMENT DASHBOARD VIEW — Summary first, then choose
═══════════════════════════════════════════════════════════ */
function DashboardView({tasks,projects,team,onAddTask,onEditTask,isManager,currentUser}){
  const [focusMember,setFocusMember]=useState(null); // null = show all summary
  const activeTasks=tasks.filter(t=>t.status!=="done");
  const overdueTasks=activeTasks.filter(t=>isOverdue(t));
  const blockedTasks=activeTasks.filter(t=>t.status==="blocked");
  const atRiskProjects=projects.filter(p=>p.status!=="Done"&&(calcProjectRisk(p,tasks)==="atrisk"||calcProjectRisk(p,tasks)==="stalled"));
  const overloadedPeople=team.filter(m=>calcWorkload(tasks,m.id).level==="red");
  const proj=id=>projects.find(p=>p.id===id);

  // Tasks for a specific person, sorted by urgency
  const memberTasks=(memberId)=>[...activeTasks]
    .filter(t=>t.owner===memberId)
    .sort((a,b)=>{
      const score=t=>(isOverdue(t)?0:isAtRiskDate(t)?1:2)+(t.priority==="critical"?0:t.priority==="thisweek"?1:t.priority==="queued"?2:3);
      return score(a)-score(b);
    });

  const draftingTeam=team.filter(m=>m.group==="drafting");
  const designTeam=team.filter(m=>m.group==="design");

  // Team workload summary bar
  const WlBar=({member})=>{
    const wl=calcWorkload(tasks,member.id);
    const col=wl.level==="green"?"var(--green)":wl.level==="yellow"?"var(--yellow)":wl.level==="orange"?"var(--orange)":"var(--red)";
    const isSelected=focusMember===member.id;
    const mTasks=memberTasks(member.id);
    const overdueCount=mTasks.filter(t=>isOverdue(t)).length;
    return(
      <div onClick={()=>setFocusMember(isSelected?null:member.id)}
        style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",
          background:isSelected?"var(--surface2)":"transparent",
          border:isSelected?`1px solid ${member.color}44`:"1px solid transparent",
          transition:"all .15s"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
          <div style={{width:24,height:24,borderRadius:6,background:member.color+"33",border:`1px solid ${member.color}55`,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:member.color,flexShrink:0}}>{member.initials}</div>
          <span style={{fontSize:12,fontWeight:600,color:"var(--text)",flex:1}}>{member.name}</span>
          {overdueCount>0&&<span style={{background:"var(--red)",color:"#fff",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:999}}>{overdueCount}!</span>}
          <span style={{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",color:col,fontWeight:700}}>{wl.hrs}h</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div className="wl-bar-bg"><div className={`wl-bar-fill wl-${wl.level}`} style={{width:`${wl.pct}%`}}/></div>
          <span style={{fontSize:10,color:"var(--text3)",fontFamily:"'IBM Plex Mono',monospace",minWidth:24}}>{wl.count}t</span>
        </div>
      </div>
    );
  };

  return(
    <div className="page fade-up">
      {/* Alert bar */}
      {overdueTasks.length>0&&(
        <div className="alert-bar" style={{marginBottom:20,borderRadius:10}}>
          <span style={{fontSize:14}}>⚠</span>
          <span><b>{overdueTasks.length} overdue task{overdueTasks.length>1?"s":""}</b> require immediate attention</span>
          {blockedTasks.length>0&&<span style={{marginLeft:16,color:"var(--orange)"}}>· {blockedTasks.length} blocked</span>}
        </div>
      )}

      {/* KPI row */}
      <div className="kpi-grid" style={{marginBottom:20}}>
        <div className={`kpi ${overdueTasks.length>0?"danger":"ok"}`}>
          <div className="kpi-label">Overdue Tasks</div>
          <div className="kpi-val">{overdueTasks.length}</div>
          <div className="kpi-sub">{overdueTasks.length===0?"All clear ✓":`${overdueTasks.length} need action now`}</div>
        </div>
        <div className={`kpi ${atRiskProjects.length>0?"warn":"ok"}`}>
          <div className="kpi-label">At Risk Projects</div>
          <div className="kpi-val">{atRiskProjects.length}</div>
          <div className="kpi-sub">of {projects.filter(p=>p.status!=="Done").length} active</div>
        </div>
        <div className="kpi info">
          <div className="kpi-label">Active Tasks</div>
          <div className="kpi-val">{activeTasks.length}</div>
          <div className="kpi-sub">{blockedTasks.length} blocked · {activeTasks.filter(t=>t.status==="waiting").length} waiting</div>
        </div>
        <div className={`kpi ${overloadedPeople.length>0?"danger":"ok"}`}>
          <div className="kpi-label">Overloaded</div>
          <div className="kpi-val">{overloadedPeople.length}</div>
          <div className="kpi-sub">{overloadedPeople.length===0?"Workload balanced ✓":overloadedPeople.map(m=>m.name).join(", ")}</div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:20}}>
        {/* Left: team member task panels */}
        <div>
          <div style={{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:10}}>
            {focusMember?`Tasks — ${team.find(m=>m.id===focusMember)?.name}`:"Click a person to see their tasks"}
          </div>

          {focusMember?(()=>{
            const member=team.find(m=>m.id===focusMember);
            const mTasks=memberTasks(focusMember);
            return(
              <div className="card">
                <div className="section-title">
                  <span style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:22,height:22,borderRadius:6,background:member.color+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:member.color}}>{member.initials}</span>
                    {member.name}'s Tasks
                  </span>
                  <span className="count">{mTasks.length} active</span>
                  {isManager&&<button className="btn btn-sm btn-primary" style={{marginLeft:"auto"}} onClick={()=>onAddTask("",focusMember)}>+ Task</button>}
                </div>
                {mTasks.length===0?(
                  <div className="empty"><div className="empty-icon">✓</div><p>No active tasks for {member.name}.</p></div>
                ):(
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {mTasks.map(task=>{
                      const p=proj(task.projectId);
                      const over=isOverdue(task);
                      return(
                        <div key={task.id} className={`task-card ${over?"overdue-card":task.status==="blocked"?"blocked-card":""}`}
                          style={{cursor:isManager?"pointer":"default"}} onClick={()=>isManager&&onEditTask(task)}>
                          <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:13,fontWeight:600,color:over?"var(--red)":"var(--text)",marginBottom:2}}>
                                {task.title}
                                {task.placeholder&&<span style={{marginLeft:6,fontSize:10,color:"var(--yellow)",fontStyle:"italic"}}>(placeholder)</span>}
                              </div>
                              {p&&<div style={{fontSize:11,color:"var(--text3)"}}>{p.address||p.name} · <TypeTag t={p.type}/></div>}
                            </div>
                            <PriTag p={task.priority}/>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                            <StatusTag s={task.status}/>
                            {task.dueDate&&<span style={{fontSize:11,color:over?"var(--red)":isAtRiskDate(task)?"var(--orange)":"var(--text3)",fontFamily:"'IBM Plex Mono',monospace"}}>
                              {over?`${Math.abs(daysDiff(task.dueDate))}d overdue`:`Due ${fmtDate(task.dueDate)}`}
                            </span>}
                            {task.status==="blocked"&&<span style={{fontSize:11,color:"var(--orange)"}}>⊗ {task.blockedReason||"Blocked"}</span>}
                            {task.estimatedHours&&<span style={{fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text3)"}}>{task.estimatedHours}h</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })():(
            /* No person selected — show at-risk projects summary */
            atRiskProjects.length>0?(
              <div className="card">
                <div className="section-title">⚠ At Risk & Stalled <span className="count">{atRiskProjects.length}</span></div>
                <table className="tbl">
                  <thead><tr><th>Address</th><th>Type</th><th>Risk</th><th>Drafter</th><th>Designer</th><th>Activity</th></tr></thead>
                  <tbody>
                    {atRiskProjects.map(p=>(
                      <tr key={p.id}>
                        <td><div style={{fontWeight:600,fontSize:12}}>{p.address||p.name}</div><div style={{fontSize:10,color:"var(--text3)"}}>{p.market}</div></td>
                        <td><TypeTag t={p.type}/></td>
                        <td><RiskTag r={calcProjectRisk(p,tasks)}/></td>
                        <td><OwnerChip memberId={p.draftOwner||p.primaryOwner} team={team}/></td>
                        <td><OwnerChip memberId={p.designOwner} team={team}/></td>
                        <td style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"var(--text3)"}}>{p.lastActivity?`${daysSinceActivity(p.lastActivity)}d ago`:"—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ):(
              <div className="card">
                <div className="empty" style={{padding:"32px 0"}}><div className="empty-icon" style={{fontSize:40,opacity:1}}>✓</div><p style={{color:"var(--green)",fontWeight:600,fontSize:14}}>No risks detected</p><p style={{marginTop:4}}>Click a team member on the right to see their tasks.</p></div>
              </div>
            )
          )}
        </div>

        {/* Right: team roster clickable */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {/* Drafting Team */}
          <div className="card" style={{padding:"12px 10px"}}>
            <div style={{fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:6,paddingLeft:4}}>Drafting Team</div>
            {draftingTeam.map(m=><WlBar key={m.id} member={m}/>)}
          </div>

          {/* Design Team */}
          <div className="card" style={{padding:"12px 10px"}}>
            <div style={{fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:6,paddingLeft:4}}>Design Team</div>
            {designTeam.map(m=><WlBar key={m.id} member={m}/>)}
          </div>

          {/* Quick stats */}
          <div className="card">
            <div className="section-title">Quick Stats</div>
            {[
              {label:"Active Projects",val:projects.filter(p=>p.status!=="Done").length,color:"var(--accent)"},
              {label:"Total Active Tasks",val:activeTasks.length,color:"var(--text)"},
              {label:"Blocked",val:blockedTasks.length,color:"var(--red)"},
              {label:"Waiting on External",val:activeTasks.filter(t=>t.status==="waiting").length,color:"var(--yellow)"},
              {label:"Done This Week",val:tasks.filter(t=>t.status==="done"&&t.completedAt&&Date.now()-t.completedAt<7*24*3600*1000).length,color:"var(--green)"},
            ].map(s=>(
              <div key={s.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
                <span style={{fontSize:12,color:"var(--text2)"}}>{s.label}</span>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:14,color:s.color}}>{s.val}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   PROJECT PIPELINE VIEW
═══════════════════════════════════════════════════════════ */
function PipelineView({tasks,projects,team,isManager,onNewProject,onEditProject,onSelectProject}){
  const [typeFilter,setTypeFilter]=useState("All");
  const [ownerFilter,setOwnerFilter]=useState("all");
  const [riskFilter,setRiskFilter]=useState("all");

  const filtered=useMemo(()=>{
    return projects.filter(p=>{
      if(p.status==="Done")return false;
      if(typeFilter!=="All"&&p.type!==typeFilter)return false;
      if(ownerFilter!=="all"){
        // match either drafter or designer
        const isDraft=(p.draftOwner||p.primaryOwner)===ownerFilter;
        const isDesign=p.designOwner===ownerFilter;
        if(!isDraft&&!isDesign)return false;
      }
      const risk=calcProjectRisk(p,tasks);
      if(riskFilter==="risk"&&risk!=="atrisk")return false;
      if(riskFilter==="stalled"&&risk!=="stalled")return false;
      return true;
    }).sort((a,b)=>{
      const rOrder={atrisk:0,stalled:1,ontrack:2,onhold:3};
      return(rOrder[calcProjectRisk(a,tasks)]||2)-(rOrder[calcProjectRisk(b,tasks)]||2);
    });
  },[projects,tasks,typeFilter,ownerFilter,riskFilter]);

  return(
    <div className="page fade-up">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:"var(--text)",flex:1}}>Project Pipeline</div>
        <div className="tabs">
          {["All",...PROJECT_TYPES].map(t=><button key={t} className={`tab ${typeFilter===t?"active":""}`} onClick={()=>setTypeFilter(t)}>{t}</button>)}
        </div>
        <select value={ownerFilter} onChange={e=>setOwnerFilter(e.target.value)} style={{width:"auto",padding:"6px 10px",fontSize:12}}>
          <option value="all">All Owners</option>
          {team.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
        </select>
        <select value={riskFilter} onChange={e=>setRiskFilter(e.target.value)} style={{width:"auto",padding:"6px 10px",fontSize:12}}>
          <option value="all">All Status</option>
          <option value="risk">At Risk</option>
          <option value="stalled">Stalled</option>
        </select>
        {isManager&&<button className="btn btn-primary" onClick={onNewProject}>+ New Project</button>}
      </div>

      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <table className="tbl">
          <thead>
            <tr>
              <th>Address / Project</th><th>Type</th><th>Stage</th><th>Drafter</th><th>Designer</th>
              <th>Progress</th><th>Due (COE)</th><th>Risk</th><th>Activity</th>
              {isManager&&<th></th>}
            </tr>
          </thead>
          <tbody>
            {filtered.length===0&&(
              <tr><td colSpan={10} style={{textAlign:"center",padding:40,color:"var(--text3)"}}>No projects match this filter</td></tr>
            )}
            {filtered.map(p=>{
              const ptasks=tasks.filter(t=>t.projectId===p.id);
              const done=ptasks.filter(t=>t.status==="done").length;
              const total=ptasks.length;
              const pct=total?Math.round(done/total*100):0;
              const risk=calcProjectRisk(p,tasks);
              const daysLeft=p.targetDate?daysDiff(p.targetDate):null;
              const rowBg=risk==="atrisk"?"rgba(255,77,77,.03)":risk==="stalled"?"rgba(255,140,66,.03)":"";
              return(
                <tr key={p.id} style={{cursor:"pointer",background:rowBg}} onClick={()=>onSelectProject(p)}>
                  <td>
                    <div style={{fontWeight:600,color:"var(--text)",fontSize:13,marginBottom:2}}>{p.address||p.name}</div>
                    {p.market&&<div style={{fontSize:11,color:"var(--text3)"}}>{p.market}</div>}
                    {p.knackLink&&<a href={p.knackLink} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"var(--accent)"}} onClick={e=>e.stopPropagation()}>↗ Knack</a>}
                  </td>
                  <td><TypeTag t={p.type}/></td>
                  <td><span style={{fontSize:11,color:"var(--text2)"}}>{p.currentStage||"—"}</span></td>
                  <td><OwnerChip memberId={p.draftOwner||p.primaryOwner} team={team}/></td>
                  <td><OwnerChip memberId={p.designOwner} team={team}/></td>
                  <td style={{minWidth:100}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div className="wl-bar-bg" style={{height:4}}>
                        <div className="wl-bar-fill wl-green" style={{width:`${pct}%`}}/>
                      </div>
                      <span style={{fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text3)",minWidth:30}}>{pct}%</span>
                    </div>
                    <div style={{fontSize:10,color:"var(--text3)"}}>{done}/{total} tasks</div>
                  </td>
                  <td style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:daysLeft!==null&&daysLeft<0?"var(--red)":daysLeft!==null&&daysLeft<=7?"var(--orange)":"var(--text3)",whiteSpace:"nowrap"}}>
                    {daysLeft!==null?(daysLeft<0?`${Math.abs(daysLeft)}d late`:`${daysLeft}d left`):"—"}
                  </td>
                  <td><RiskTag r={risk}/></td>
                  <td style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"var(--text3)",whiteSpace:"nowrap"}}>
                    {p.lastActivity?`${daysSinceActivity(p.lastActivity)}d ago`:"—"}
                  </td>
                  {isManager&&<td onClick={e=>{e.stopPropagation();onEditProject(p)}} style={{cursor:"pointer",color:"var(--text3)",fontSize:12}}>✏</td>}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   PROJECT DETAIL VIEW
═══════════════════════════════════════════════════════════ */
function ProjectDetailView({project,tasks,team,isManager,onBack,onAddTask,onEditTask,onDeleteTask,onUpdateTask}){
  const ptasks=tasks.filter(t=>t.projectId===project.id).sort((a,b)=>(a.order||0)-(b.order||0)||(a.createdAt||0)-(b.createdAt||0));
  const done=ptasks.filter(t=>t.status==="done").length;
  const pct=ptasks.length?Math.round(done/ptasks.length*100):0;
  const risk=calcProjectRisk(project,tasks);
  const stages=[...new Set(ptasks.map(t=>t.stage).filter(Boolean))];

  return(
    <div className="page fade-up">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:"var(--text)"}}>{project.address||project.name}</span>
            <TypeTag t={project.type}/>
            <RiskTag r={risk}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
            {project.market&&<span style={{fontSize:11,color:"var(--text3)"}}>{project.market}</span>}
            {(project.draftOwner||project.primaryOwner)&&<OwnerChip memberId={project.draftOwner||project.primaryOwner} team={team}/>}
            {project.designOwner&&<OwnerChip memberId={project.designOwner} team={team}/>}
          </div>
        </div>
        {project.knackLink&&<a href={project.knackLink} target="_blank" rel="noopener noreferrer" className="btn btn-ghost btn-sm" style={{textDecoration:"none"}}>↗ Open in Knack</a>}
        {isManager&&<button className="btn btn-primary btn-sm" onClick={()=>onAddTask(project.id)}>+ Add Task</button>}
      </div>

      {/* Progress bar */}
      <div className="card" style={{marginBottom:16,padding:"14px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,color:"var(--text2)"}}>Overall Progress</span>
          <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,color:"var(--green)"}}>{pct}%</span>
        </div>
        <div className="wl-bar-bg" style={{height:8}}>
          <div className="wl-bar-fill wl-green" style={{width:`${pct}%`,transition:"width .8s ease"}}/>
        </div>
        <div style={{display:"flex",gap:16,marginTop:10,flexWrap:"wrap"}}>
          {[{label:"Total Tasks",val:ptasks.length,c:"var(--text)"},{label:"Done",val:done,c:"var(--green)"},{label:"In Progress",val:ptasks.filter(t=>t.status==="inprogress").length,c:"var(--accent)"},{label:"Blocked",val:ptasks.filter(t=>t.status==="blocked").length,c:"var(--red)"},{label:"Waiting",val:ptasks.filter(t=>t.status==="waiting").length,c:"var(--yellow)"}].map(s=>(
            <div key={s.label} style={{textAlign:"center"}}>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:16,color:s.c}}>{s.val}</div>
              <div style={{fontSize:10,color:"var(--text3)"}}>{s.label}</div>
            </div>
          ))}
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:11,color:"var(--text3)"}}>Est. total</div>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,color:"var(--text)"}}>{ptasks.reduce((s,t)=>s+(+t.estimatedHours||0),0)}h</div>
          </div>
        </div>
      </div>

      {/* Tasks by stage */}
      {(stages.length>0?stages:["Tasks"]).map(stage=>{
        const stageTasks=stages.length>0?ptasks.filter(t=>t.stage===stage):ptasks;
        if(!stageTasks.length)return null;
        return(
          <div key={stage} style={{marginBottom:16}}>
            <div style={{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text3)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8,padding:"0 4px"}}>{stage}</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {stageTasks.map(task=>(
                <div key={task.id} className={`task-card ${isOverdue(task)?"overdue-card":task.status==="blocked"?"blocked-card":""}`}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:task.status==="done"?"var(--text3)":"var(--text)",textDecoration:task.status==="done"?"line-through":"none"}}>{task.title}</div>
                      {task.notes&&<div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>💬 {task.notes}</div>}
                      {task.status==="blocked"&&task.blockedReason&&<div style={{fontSize:11,color:"var(--orange)",marginTop:2}}>⊗ {task.blockedReason}</div>}
                    </div>
                    <PriTag p={task.priority}/>
                    {isManager&&(
                      <div style={{display:"flex",gap:3}}>
                        <button className="btn-icon" onClick={()=>onEditTask(task)} style={{fontSize:11}}>✏</button>
                        <button className="btn-icon" onClick={()=>onDeleteTask(task.id)} style={{fontSize:11,color:"var(--red)"}}>✕</button>
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    {isManager?(
                      <select value={task.status} onChange={e=>onUpdateTask(task.id,{status:e.target.value,completedAt:e.target.value==="done"?Date.now():task.completedAt})}
                        style={{width:"auto",fontSize:11,padding:"2px 6px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text)"}}>
                        {Object.entries(TASK_STATUSES).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
                      </select>
                    ):<StatusTag s={task.status}/>}
                    <OwnerChip memberId={task.owner} team={team}/>
                    {task.dueDate&&<span style={{fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:isOverdue(task)?"var(--red)":"var(--text3)"}}>Due {fmtDate(task.dueDate)}</span>}
                    {task.estimatedHours&&<span style={{fontSize:10,fontFamily:"'IBM Plex Mono',monospace",color:"var(--text3)"}}>{task.estimatedHours}h</span>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   WORKLOAD VIEW
═══════════════════════════════════════════════════════════ */
function WorkloadView({tasks,projects,team,isManager,onAddTask,onEditTask}){
  const [selected,setSelected]=useState(null);
  const draftingTeam=team.filter(m=>m.group==="drafting");
  const designTeam=team.filter(m=>m.group==="design");

  const MemberCard=({member})=>{
    const wl=calcWorkload(tasks,member.id);
    const memberTasks=tasks.filter(t=>t.owner===member.id&&t.status!=="done");
    const overdueCnt=memberTasks.filter(t=>isOverdue(t)).length;
    const blockedCnt=memberTasks.filter(t=>t.status==="blocked").length;
    const textColor=wl.level==="green"?"var(--green)":wl.level==="yellow"?"var(--yellow)":wl.level==="orange"?"var(--orange)":"var(--red)";
    const barColor=wl.level==="green"?"wl-green":wl.level==="yellow"?"wl-yellow":wl.level==="orange"?"wl-orange":"wl-red";
    const isExpanded=selected===member.id;
    const proj=id=>projects.find(p=>p.id===id);

    return(
      <div className="card" style={{cursor:"pointer",transition:"border-color .2s"}} onClick={()=>setSelected(isExpanded?null:member.id)}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          <div style={{width:44,height:44,borderRadius:12,background:member.color+"22",border:`2px solid ${member.color}44`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:member.color,flexShrink:0}}>{member.initials}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{member.name}</div>
            <div style={{fontSize:11,color:"var(--text3)"}}>{member.role}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:800,fontSize:18,color:textColor}}>{wl.hrs}h</div>
            <div style={{fontSize:10,color:"var(--text3)"}}>/ {CAPACITY_HOURS_WEEK}h capacity</div>
          </div>
        </div>
        <div className="wl-bar-bg" style={{height:8,marginBottom:10}}>
          <div className={`wl-bar-fill ${barColor}`} style={{width:`${wl.pct}%`}}/>
        </div>
        <div style={{display:"flex",gap:12}}>
          {[{label:"Active Tasks",val:wl.count,c:"var(--text)"},{label:"Overdue",val:overdueCnt,c:overdueCnt>0?"var(--red)":"var(--text3)"},{label:"Blocked",val:blockedCnt,c:blockedCnt>0?"var(--orange)":"var(--text3)"}].map(s=>(
            <div key={s.label}>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,fontSize:14,color:s.c}}>{s.val}</div>
              <div style={{fontSize:10,color:"var(--text3)"}}>{s.label}</div>
            </div>
          ))}
          <div style={{marginLeft:"auto",fontSize:11,color:"var(--text3)"}}>
            {isExpanded?"▲ Hide tasks":"▼ Show tasks"}
          </div>
        </div>

        {isExpanded&&(
          <div style={{marginTop:12,borderTop:"1px solid var(--border)",paddingTop:12}} onClick={e=>e.stopPropagation()}>
            {memberTasks.length===0?<div style={{color:"var(--text3)",fontSize:12,textAlign:"center",padding:12}}>No active tasks</div>:(
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {memberTasks.sort((a,b)=>{const po={critical:0,thisweek:1,queued:2,backlog:3};return(po[a.priority]||3)-(po[b.priority]||3)}).map(task=>{
                  const p=proj(task.projectId);
                  return(
                    <div key={task.id} className={`task-card ${isOverdue(task)?"overdue-card":""}`} style={{cursor:isManager?"pointer":"default"}} onClick={()=>isManager&&onEditTask(task)}>
                      <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:12,fontWeight:600,color:isOverdue(task)?"var(--red)":"var(--text)"}}>{task.title}

  const proj=id=>projects.find(p=>p.id===id);
  const allClear=!overdueTasks.length&&!blockedTasks.length&&!stalledProjects.length&&!atRiskProjects.length;

  if(allClear)return(

          {showProject&&p&&<div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{p.address||p.name} · <TypeTag t={p.type}/></div>}
          {task.status==="blocked"&&task.blockedReason&&<div style={{fontSize:11,color:"var(--orange)",marginTop:2}}>⊗ {task.blockedReason}</div>}

        {daysOver!==null&&<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"var(--red)",fontWeight:700}}>{daysOver}d overdue</span>}
        <PriTag p={task.priority}/>
        <StatusTag s={task.status}/>
      </div>
    );
  };

  return(
    <div className="page fade-up">
      <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:"var(--text)",marginBottom:20}}>At Risk & Overdue</div>
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        {overdueTasks.length>0&&(
          <div className="card">
            <div className="section-title" style={{color:"var(--red)"}}>🔴 Overdue Tasks <span className="count">{overdueTasks.length}</span></div>

            </div>
          </div>
        )}
        {blockedTasks.length>0&&(
          <div className="card">
            <div className="section-title" style={{color:"var(--orange)"}}>⊗ Blocked Tasks <span className="count">{blockedTasks.length}</span></div>

function RichText({text}){
  if(!text)return null;
  const parts=[];const regex=/\*\*(.+?)\*\*|\[(.+?)\]\((https?:\/\/[^\)]+)\)/g;
  let last=0,m;
  while((m=regex.exec(text))!==null){
    if(m.index>last)parts.push(<span key={last}>{text.slice(last,m.index)}</span>);
    if(m[1])parts.push(<strong key={m.index}>{m[1]}</strong>);
    else parts.push(<a key={m.index} href={m[3]} target="_blank" rel="noopener noreferrer" style={{color:"var(--accent)"}}>{m[2]}</a>);
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(<span key={last}>{text.slice(last)}</span>);
  return <span>{parts}</span>;
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════ */
function App(){
  const [currentUser,setCurrentUser]=useState(()=>localStorage.getItem("tlh_v2_user")||null);
  const isManager=MANAGERS.includes(currentUser);
  const isGuest=currentUser==="Guest";

  // Theme: light or dark, persisted
  const [theme,setTheme]=useState(()=>localStorage.getItem("tlh_theme")||"dark");
  useEffect(()=>{
    document.body.classList.toggle("light",theme==="light");
    localStorage.setItem("tlh_theme",theme);
  },[theme]);
  const toggleTheme=()=>setTheme(t=>t==="dark"?"light":"dark");

  const [fbReady,setFbReady]=useState(!!window.__firebase);
  const [connected,setConnected]=useState(false);
  const [tasks,setTasks]=useState([]);
  const [projects,setProjects]=useState([]);
  const [archivedTasks,setArchivedTasks]=useState([]);
  const [team,setTeamState]=useState(DEFAULT_TEAM);
  const [announcements,setAnnouncements]=useState([]);
  const [pendingItems,setPendingItems]=useState([]);

  const [view,setView]=useState("dashboard");
  const [selectedProject,setSelectedProject]=useState(null);
  const [showProjectForm,setShowProjectForm]=useState(false);
  const [editingProject,setEditingProject]=useState(null);
  const [showTaskForm,setShowTaskForm]=useState(false);
  const [editingTask,setEditingTask]=useState(null);
  const [taskFormDefaults,setTaskFormDefaults]=useState({projectId:"",owner:""});

  const handleLogin=name=>{localStorage.setItem("tlh_v2_user",name);setCurrentUser(name);};

  useEffect(()=>{
    if(window.__firebase){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("firebase-ready",h);
    return()=>window.removeEventListener("firebase-ready",h);
  },[]);

  useEffect(()=>{
    if(!fbReady)return;
    const{db,ref,onValue}=window.__firebase;
    const unsubs=[];
    unsubs.push(onValue(ref(db,FIREBASE_PATHS.tasks),snap=>{
      const d=snap.val();
      setTasks(d?Object.entries(d).map(([id,v])=>({...v,id})):[]);
      setConnected(true);
    }));
    unsubs.push(onValue(ref(db,FIREBASE_PATHS.projects),snap=>{
      const d=snap.val();
      setProjects(d?Object.entries(d).map(([id,v])=>({...v,id})):[]);
    }));
    unsubs.push(onValue(ref(db,FIREBASE_PATHS.archived),snap=>{
      const d=snap.val();
      setArchivedTasks(d?Object.entries(d).map(([id,v])=>({...v,id})):[]);
    }));
    unsubs.push(onValue(ref(db,"team"),snap=>{
      const d=snap.val();
      if(d&&Array.isArray(d))setTeamState(d);
      else if(d&&typeof d==="object")setTeamState(Object.values(d));
    }));
    unsubs.push(onValue(ref(db,"announcements"),snap=>{
      const d=snap.val();
      setAnnouncements(d?Object.entries(d).map(([id,v])=>({...v,id})).sort((a,b)=>b.createdAt-a.createdAt):[]);
    }));
    unsubs.push(onValue(ref(db,"pending"),snap=>{
      const d=snap.val();
      setPendingItems(d?Object.entries(d).map(([id,v])=>({...v,id})).sort((a,b)=>b.createdAt-a.createdAt):[]);
    }));
    return()=>unsubs.forEach(u=>u());
  },[fbReady]);

  /* Firebase helpers */
  const fbAdd=useCallback(async(path,data)=>{const{db,ref,push}=window.__firebase;return push(ref(db,path),data);},[]);
  const fbSet=useCallback(async(path,data)=>{const{db,ref,set}=window.__firebase;return set(ref(db,path),data);},[]);
  const fbUpdate=useCallback(async(path,data)=>{const{db,ref,update}=window.__firebase;return update(ref(db,path),data);},[]);
  const fbRemove=useCallback(async(path)=>{const{db,ref,remove}=window.__firebase;return remove(ref(db,path));},[]);

  /* Project actions */
  const saveProject=async(project,taskList=[])=>{
    await fbSet(`${FIREBASE_PATHS.projects}/${project.id}`,project);
    for(const t of taskList){
      await fbSet(`${FIREBASE_PATHS.tasks}/${t.id}`,t);
    }
    setShowProjectForm(false);setEditingProject(null);
    if(taskList.length>0)setView("pipeline");
  };

  const updateProject=(id,data)=>fbUpdate(`${FIREBASE_PATHS.projects}/${id}`,{...data,lastActivity:Date.now()});

  /* Task actions */
  const saveTask=async(task)=>{
    await fbSet(`${FIREBASE_PATHS.tasks}/${task.id}`,task);
    if(task.projectId)await fbUpdate(`${FIREBASE_PATHS.projects}/${task.projectId}`,{lastActivity:Date.now()});
    setShowTaskForm(false);setEditingTask(null);
  };

  const updateTask=async(taskId,data)=>{
    await fbUpdate(`${FIREBASE_PATHS.tasks}/${taskId}`,data);
    const t=tasks.find(x=>x.id===taskId);
    if(t?.projectId)await fbUpdate(`${FIREBASE_PATHS.projects}/${t.projectId}`,{lastActivity:Date.now()});
  };

  const deleteTask=async(taskId)=>{
    await fbRemove(`${FIREBASE_PATHS.tasks}/${taskId}`);
  };

  const archiveDone=async()=>{
    const done=tasks.filter(t=>t.status==="done");
    for(const t of done){
      await fbSet(`${FIREBASE_PATHS.archived}/${t.id}`,{...t,archivedAt:Date.now()});
      await fbRemove(`${FIREBASE_PATHS.tasks}/${t.id}`);
    }
  };

  const restoreTask=async(task)=>{
    const{archivedAt,...rest}=task;
    await fbSet(`${FIREBASE_PATHS.tasks}/${task.id}`,{...rest,status:"todo"});
    await fbRemove(`${FIREBASE_PATHS.archived}/${task.id}`);
  };

  const openAddTask=(projectId="",owner="")=>{
    setEditingTask(null);setTaskFormDefaults({projectId,owner});setShowTaskForm(true);

  const openEditTask=(task)=>{setEditingTask(task);setShowTaskForm(true);};

  /* Sidebar nav counts */

  const blockedCount=tasks.filter(t=>t.status==="blocked").length;

  if(!fbReady||!connected)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",gap:12}}>
      <div style={{fontSize:28,animation:"spin 1s linear infinite",display:"inline-block"}}>⚙</div>
      <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:"var(--text3)"}}>Connecting to database…</div>
    </div>
  );

  const navItems=[
    {id:"dashboard",icon:"▦",label:"Dashboard",badge:overdueCount>0?overdueCount:null,badgeCls:""},
    {id:"pipeline",icon:"◫",label:"Pipeline",badge:null},
    {id:"workload",icon:"◈",label:"Workload",badge:null},
    {id:"risk",icon:"⚠",label:"At Risk",badge:riskCount>0?riskCount:null,badgeCls:"warn"},
    {id:"hub",icon:"◉",label:"Team Hub",badge:null},
    {id:"archive",icon:"◱",label:"Archive",badge:null},
  ];

  // If a project is selected, show detail view
  const showProjectDetail=selectedProject&&view==="pipeline";

  return(
    <div className="app-shell">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="brand">TLH Operations</div>
          <div className="sub">Dashboard V2</div>
        </div>
        <div className="nav-section">Navigation</div>
        {navItems.map(item=>(
          <div key={item.id} className={`nav-item ${view===item.id&&!showProjectDetail?"active":""}`} onClick={()=>{setView(item.id);setSelectedProject(null);}}>
            <span className="icon">{item.icon}</span>
            {item.label}
            {item.badge&&<span className={`nav-badge ${item.badgeCls}`}>{item.badge}</span>}
          </div>
        ))}
        <div className="nav-section">Quick Actions</div>
        {isManager&&(
          <>
            <div className="nav-item" onClick={()=>openAddTask()}>
              <span className="icon">+</span>Add Task
            </div>
            <div className="nav-item" onClick={()=>{setEditingProject(null);setShowProjectForm(true);}}>
              <span className="icon">◻</span>New Project
            </div>
          </>
        )}
        <a href="https://truelegacyhomes.knack.com/projects/#plan-priority-list/" target="_blank" rel="noopener noreferrer" className="nav-item" style={{textDecoration:"none"}}>
          <span className="icon">↗</span>Open Knack
        </a>
        <div className="sidebar-bottom">
          {isManager&&tasks.filter(t=>t.status==="done").length>0&&(
            <button className="btn btn-ghost btn-sm" style={{width:"100%",marginBottom:6,fontSize:11}} onClick={archiveDone}>
              📦 Archive Done ({tasks.filter(t=>t.status==="done").length})
            </button>
          )}
          {/* Theme toggle */}
          <div className="theme-toggle" onClick={toggleTheme}>
            <span style={{fontSize:12}}>{theme==="dark"?"🌙":"☀️"}</span>
            <span style={{flex:1,fontSize:11,color:"var(--text2)",fontWeight:500}}>{theme==="dark"?"Dark mode":"Light mode"}</span>
            <div className={`theme-toggle-track ${theme==="light"?"on":""}`}>
              <div className="theme-toggle-thumb"/>
            </div>
          </div>
          <div className="user-chip">
            <div className="user-avatar" style={{background:currentUser==="María"?"#7c3aed33":currentUser==="Oyku"?"#1d4ed833":"#5a607533",color:currentUser==="María"?"#7c3aed":currentUser==="Oyku"?"#1d4ed8":"#9095a8",border:`1px solid ${currentUser==="María"?"#7c3aed44":currentUser==="Oyku"?"#1d4ed844":"#5a607544"}`}}>
              {currentUser==="María"?"MA":currentUser==="Oyku"?"OY":"GU"}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{currentUser}</div>
              <div style={{fontSize:10,color:"var(--text3)"}}>{isManager?"Manager":"View only"}</div>
            </div>
            <button className="btn-icon" onClick={()=>{localStorage.removeItem("tlh_v2_user");setCurrentUser(null);}} style={{fontSize:11}} title="Sign out">⏻</button>
          </div>
        </div>
      </div>

      {/* Main area */}
      <div className="main">
        {/* Topbar */}
        <div className="topbar">
          <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"var(--text3)"}}>
            {showProjectDetail?selectedProject.name:navItems.find(n=>n.id===view)?.label||""}
            <span style={{marginLeft:8,color:"var(--text3)"}}>· {new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"var(--green)"}}>● Live</span>
            <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"var(--text3)"}}>{projects.filter(p=>p.status!=="Done").length} projects · {tasks.filter(t=>t.status!=="done").length} active tasks</span>
          </div>
        </div>

        {/* Views */}
        {view==="dashboard"&&<DashboardView tasks={tasks} projects={projects} team={team} onAddTask={(pid,ownerId)=>openAddTask(pid||"",ownerId||"")} onEditTask={openEditTask} isManager={isManager} currentUser={currentUser}/>}

        {view==="pipeline"&&!showProjectDetail&&<PipelineView tasks={tasks} projects={projects} team={team} isManager={isManager} onNewProject={()=>{setEditingProject(null);setShowProjectForm(true);}} onEditProject={p=>{setEditingProject(p);setShowProjectForm(true);}} onSelectProject={p=>{setSelectedProject(p);}}/>}

        {showProjectDetail&&<ProjectDetailView project={selectedProject} tasks={tasks} team={team} isManager={isManager} onBack={()=>setSelectedProject(null)} onAddTask={(pid)=>openAddTask(pid)} onEditTask={openEditTask} onDeleteTask={deleteTask} onUpdateTask={updateTask}/>}

        {view==="workload"&&<WorkloadView tasks={tasks} projects={projects} team={team} isManager={isManager} onAddTask={openAddTask} onEditTask={openEditTask}/>}

        {view==="risk"&&<AtRiskView tasks={tasks} projects={projects} team={team} isManager={isManager} onEditTask={openEditTask} onEditProject={p=>{setEditingProject(p);setShowProjectForm(true);}}/>}

        {view==="hub"&&<TeamHubView announcements={announcements} pendingItems={pendingItems} currentUser={currentUser} isManager={isManager} fbAdd={fbAdd} fbUpdate={fbUpdate} fbRemove={fbRemove}/>}

        {view==="archive"&&<ArchiveView archivedTasks={archivedTasks} projects={projects} team={team} isManager={isManager} onRestore={restoreTask}/>}
      </div>

      {/* Modals */}
      {showProjectForm&&(
        <ProjectFormModal team={team} onSave={saveProject} onClose={()=>{setShowProjectForm(false);setEditingProject(null);}} editProject={editingProject}/>
      )}
      {showTaskForm&&(
        <TaskFormModal team={team} projects={projects} onSave={saveTask} onClose={()=>{setShowTaskForm(false);setEditingTask(null);}} editTask={editingTask} defaultProjectId={taskFormDefaults.projectId} defaultOwner={taskFormDefaults.owner}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
