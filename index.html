    apiKey: "AIzaSyAGmNO4ahLzfOxZpF9LSicLxQ6il4BQazU",
    authDomain: "tlhtraker.firebaseapp.com",
    databaseURL: "https://tlhtraker-default-rtdb.firebaseio.com",
    projectId: "tlhtraker",
    storageBucket: "tlhtraker.firebasestorage.app",
    messagingSenderId: "672471262908",
    appId: "1:672471262908:web:174550ce3548b9d18f12b9"

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.__firebase = { db, ref, onValue, set, push, remove, update };

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const DEFAULT_TEAM=[
  {id:"mgr",name:"You (Manager)",role:"Interior Design Manager",color:"#ede9fe",border:"#a78bfa",badgeColor:"#7c3aed"},
  {id:"id1",name:"Designer 1",role:"Interior Designer",color:"#dbeafe",border:"#60a5fa",badgeColor:"#1d4ed8"},
  {id:"id2",name:"Designer 2",role:"Interior Designer",color:"#ccfbf1",border:"#2dd4bf",badgeColor:"#0f766e"},
  {id:"pa",name:"Purchasing Agent",role:"Purchasing Agent",color:"#fef3c7",border:"#fbbf24",badgeColor:"#92400e"},
  {id:"ds",name:"Drafting Supervisor",role:"Drafting Supervisor",color:"#ffe4e6",border:"#fb7185",badgeColor:"#be123c"},
  {id:"dr1",name:"Drafter 1",role:"Drafter",color:"#ffedd5",border:"#fb923c",badgeColor:"#c2410c"},
  {id:"dr2",name:"Drafter 2",role:"Drafter",color:"#ecfccb",border:"#a3e635",badgeColor:"#3f6212"},
  {id:"dr3",name:"Drafter 3",role:"Drafter",color:"#cffafe",border:"#22d3ee",badgeColor:"#0e7490"},
];

const DRAFTING_ROLES=["Drafter","Drafting Supervisor"];
const DESIGN_ROLES=["Interior Designer","Interior Design Manager","Purchasing Agent"];

const GREETINGS={
  "María":"¡Hola María! 🌸 Espero que hoy tengas un gran día.",
  "Maria":"¡Hola María! 🌸 Espero que hoy tengas un gran día.",
  "Oyku":"Merhaba Oyku! 🌟 Umarım bugün harika bir gün geçirirsin.",
};
const STATUS={todo:"To Do",inprogress:"In Progress",done:"Done",overdue:"Carried Over"};
const STATUS_ICONS={todo:"○",inprogress:"◑",done:"●",overdue:"⚠"};
const BADGE_COLORS=["#7c3aed","#1d4ed8","#0f766e","#92400e","#be123c","#c2410c","#3f6212","#0e7490","#b45309","#0369a1","#7e22ce","#be185d"];
const CARD_COLORS=[
  {color:"#ede9fe",border:"#a78bfa"},{color:"#dbeafe",border:"#60a5fa"},{color:"#ccfbf1",border:"#2dd4bf"},
  {color:"#fef3c7",border:"#fbbf24"},{color:"#ffe4e6",border:"#fb7185"},{color:"#ffedd5",border:"#fb923c"},
  {color:"#ecfccb",border:"#a3e635"},{color:"#cffafe",border:"#22d3ee"},{color:"#f3e8ff",border:"#c084fc"},
  {color:"#fce7f3",border:"#f472b6"},{color:"#e0f2fe",border:"#38bdf8"},{color:"#dcfce7",border:"#4ade80"},
];

const todayStr=()=>new Date().toISOString().split("T")[0];
const fmtDate=d=>d?new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";
const fmtDateTime=ts=>ts?new Date(ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}):"";
const genId=()=>"m_"+Math.random().toString(36).slice(2,9);
const orderKey=u=>`tlh_order_${u}`;
const collapseKey=u=>`tlh_collapsed_${u}`;

const PRI=({p})=>{
  const s=p==="high"?{background:"#fee2e2",color:"#dc2626"}:p==="medium"?{background:"#fef9c3",color:"#a16207"}:{background:"#f3f4f6",color:"#6b7280"};
  return <span style={{...s,fontSize:11,padding:"2px 7px",borderRadius:999,fontWeight:600,display:"inline-block"}}>{p}</span>;
};
const StatBadge=({s})=>{
  const styles={todo:{background:"#f3f4f6",color:"#374151"},inprogress:{background:"#dbeafe",color:"#1d4ed8"},done:{background:"#dcfce7",color:"#15803d"},overdue:{background:"#fee2e2",color:"#dc2626"}};
  return <span style={{...styles[s],fontSize:11,padding:"2px 7px",borderRadius:999,fontWeight:600,display:"inline-block"}}>{STATUS_ICONS[s]} {STATUS[s]}</span>;
};
const lbl=text=><label style={{fontSize:12,color:"#6b7280",display:"block",marginBottom:4}}>{text}</label>;
const blankTask=(mid="mgr")=>({memberId:mid,title:"",priority:"medium",dueDate:todayStr(),startDate:"",endDate:""});
const smInput={border:"1px solid #d1d5db",borderRadius:6,padding:"4px 6px",fontSize:12,outline:"none"};

function RichText({text}){
  if(!text)return null;
  const parts=[];
  const regex=/\*\*(.+?)\*\*|\[(.+?)\]\((https?:\/\/[^\)]+)\)/g;
  let last=0,m;
  while((m=regex.exec(text))!==null){
    if(m.index>last)parts.push(<span key={last}>{text.slice(last,m.index)}</span>);
    if(m[1])parts.push(<strong key={m.index}>{m[1]}</strong>);
    else parts.push(<a key={m.index} href={m[3]} target="_blank" rel="noopener noreferrer">{m[2]}</a>);
    last=m.index+m[0].length;
  }
  if(last<text.length)parts.push(<span key={last}>{text.slice(last)}</span>);
  return <span className="hub-content">{parts}</span>;
}

function LoginScreen({onLogin}){
  const [greeting,setGreeting]=useState(null);
  const handleClick=name=>{
    if(GREETINGS[name]){setGreeting(GREETINGS[name]);setTimeout(()=>onLogin(name),2800);}
    else onLogin(name);
  };
  if(greeting)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#667eea 0%,#764ba2 100%)"}}>
      <div style={{background:"#fff",borderRadius:24,padding:48,width:"100%",maxWidth:420,boxShadow:"0 25px 60px rgba(0,0,0,.2)",textAlign:"center"}} className="fade-in">
        <div style={{fontSize:56,marginBottom:16}}>🏠</div>
        <div style={{fontWeight:700,fontSize:20,color:"#1f2937",lineHeight:1.5}}>{greeting}</div>
        <div style={{marginTop:24,fontSize:13,color:"#9ca3af"}}>Entering tracker…</div>
        <div style={{marginTop:12,height:4,background:"#f3f4f6",borderRadius:999,overflow:"hidden"}}>
          <div style={{height:"100%",background:"#7c3aed",borderRadius:999,animation:"progress 2.8s linear forwards"}}/>
        </div>
      </div>
    </div>
  );
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#667eea 0%,#764ba2 100%)"}}>
      <div style={{background:"#fff",borderRadius:24,padding:40,width:"100%",maxWidth:400,boxShadow:"0 25px 60px rgba(0,0,0,.2)",textAlign:"center"}} className="fade-in">
        <div style={{fontSize:52,marginBottom:10}}>🏠</div>
        <div style={{fontWeight:800,fontSize:24,color:"#1f2937",marginBottom:4}}>True Legacy Homes</div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:32}}>Team Task Tracker · Who are you?</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <button onClick={()=>handleClick("María")} style={{padding:"16px 20px",borderRadius:14,border:"2px solid #a78bfa",background:"#faf5ff",display:"flex",alignItems:"center",gap:14,textAlign:"left"}}>
            <span style={{fontSize:28}}>👑</span>
            <div><div style={{fontWeight:700,fontSize:16,color:"#7c3aed"}}>María</div><div style={{fontSize:12,color:"#9ca3af"}}>Drafting Team & Permits Supervisor</div></div>
          </button>
          <button onClick={()=>handleClick("Oyku")} style={{padding:"16px 20px",borderRadius:14,border:"2px solid #60a5fa",background:"#eff6ff",display:"flex",alignItems:"center",gap:14,textAlign:"left"}}>
            <span style={{fontSize:28}}>👑</span>
            <div><div style={{fontWeight:700,fontSize:16,color:"#1d4ed8"}}>Oyku</div><div style={{fontSize:12,color:"#9ca3af"}}>Interior Design Manager</div></div>
          </button>
          <button onClick={()=>handleClick("Guest")} style={{padding:"16px 20px",borderRadius:14,border:"2px solid #e5e7eb",background:"#f9fafb",display:"flex",alignItems:"center",gap:14,textAlign:"left"}}>
            <span style={{fontSize:28}}>👤</span>
            <div><div style={{fontWeight:700,fontSize:16,color:"#374151"}}>Guest</div><div style={{fontSize:12,color:"#9ca3af"}}>Team member · View only</div></div>
          </button>
        </div>
        <div style={{fontSize:11,color:"#d1d5db",marginTop:20}}>True Legacy Homes · Internal Tool</div>
      </div>
    </div>
  );
}

function App(){
  const [currentUser,setCurrentUser]=useState(()=>localStorage.getItem("tlh_user")||null);
  const isManager=currentUser==="María"||currentUser==="Maria"||currentUser==="Oyku";
  const isGuest=currentUser==="Guest";

  const [fbReady,setFbReady]=useState(!!window.__firebase);
  const [connected,setConnected]=useState(false);
  const [tasks,setTasks]=useState([]);
  const [archivedTasks,setArchivedTasks]=useState([]);
  const [team,setTeamState]=useState(DEFAULT_TEAM);
  const [announcements,setAnnouncements]=useState([]);
  const [pendingItems,setPendingItems]=useState([]);

  const [view,setView]=useState("board");
  const [teamFilter,setTeamFilter]=useState("all");
  const [showAdd,setShowAdd]=useState(false);
  const [showTeamEdit,setShowTeamEdit]=useState(false);
  const [showAddMember,setShowAddMember]=useState(false);
  const [teamDraft,setTeamDraft]=useState([]);
  const [filterMember,setFilterMember]=useState("all");
  const [checkinDate,setCheckinDate]=useState(todayStr());
  const [editNoteId,setEditNoteId]=useState(null);
  const [editNote,setEditNote]=useState("");
  const [editTaskId,setEditTaskId]=useState(null);
  const [editTaskVal,setEditTaskVal]=useState({});
  const [newTask,setNewTask]=useState(blankTask());
  const [saving,setSaving]=useState(false);
  const [newMember,setNewMember]=useState({name:"",role:"",colorIdx:0,badgeIdx:0});
  const [newAnnouncement,setNewAnnouncement]=useState("");
  const [newPending,setNewPending]=useState("");
  const [showArchive,setShowArchive]=useState(false);
  const [hubPreview,setHubPreview]=useState(false);
  const [colOrder,setColOrder]=useState(null);
  const [collapsedCols,setCollapsedCols]=useState([]);
  const [dragOverId,setDragOverId]=useState(null);
  const dragRef=useRef(null);

  const handleLogin=name=>{localStorage.setItem("tlh_user",name);setCurrentUser(name);};

  useEffect(()=>{
    if(!currentUser)return;
    try{
      const o=JSON.parse(localStorage.getItem(orderKey(currentUser))||"null");
      setColOrder(o);
      const c=JSON.parse(localStorage.getItem(collapseKey(currentUser))||"[]");
      setCollapsedCols(c);
    }catch{setColOrder(null);setCollapsedCols([]);}
  },[currentUser]);

  useEffect(()=>{
    if(window.__firebase){setFbReady(true);return;}
    const h=()=>setFbReady(true);
    window.addEventListener("firebase-ready",h);
    return()=>window.removeEventListener("firebase-ready",h);
  },[]);

  useEffect(()=>{
    if(!fbReady)return;
    const {db,ref,onValue}=window.__firebase;
    const unsubs=[];
    unsubs.push(onValue(ref(db,"tasks"),snap=>{
      const data=snap.val();
      setTasks(data?Object.entries(data).map(([fbId,v])=>({...v,fbId})):[]);
      setConnected(true);
    }));
    unsubs.push(onValue(ref(db,"archived"),snap=>{
      const data=snap.val();
      setArchivedTasks(data?Object.entries(data).map(([fbId,v])=>({...v,fbId})):[]);
    }));
    unsubs.push(onValue(ref(db,"team"),snap=>{
      const data=snap.val();
      if(data&&Array.isArray(data))setTeamState(data);
      else if(data)setTeamState(Object.values(data));
    }));
    unsubs.push(onValue(ref(db,"announcements"),snap=>{
      const data=snap.val();
      setAnnouncements(data?Object.entries(data).map(([id,v])=>({...v,id})).sort((a,b)=>b.createdAt-a.createdAt):[]);
    }));
    unsubs.push(onValue(ref(db,"pending"),snap=>{
      const data=snap.val();
      setPendingItems(data?Object.entries(data).map(([id,v])=>({...v,id})).sort((a,b)=>b.createdAt-a.createdAt):[]);
    }));
    return()=>unsubs.forEach(u=>u());
  },[fbReady]);

  useEffect(()=>{
    if(!colOrder&&team.length>0&&currentUser){
      let o;
      if(currentUser==="María"||currentUser==="Maria"){
        // Drafting first: Supervisor + Drafters, then the rest
        const drafting=team.filter(m=>DRAFTING_ROLES.includes(m.role)).map(m=>m.id);
        const others=team.filter(m=>!DRAFTING_ROLES.includes(m.role)).map(m=>m.id);
        o=[...drafting,...others];
      } else if(currentUser==="Oyku"){
        // Design first: Manager + Designers + Purchasing, then the rest
        const design=team.filter(m=>DESIGN_ROLES.includes(m.role)).map(m=>m.id);
        const others=team.filter(m=>!DESIGN_ROLES.includes(m.role)).map(m=>m.id);
        o=[...design,...others];
      } else {
        o=team.map(m=>m.id);
      }
      setColOrder(o);
      localStorage.setItem(orderKey(currentUser),JSON.stringify(o));
    }
  },[team,currentUser]);

  const fbAdd=async(path,data)=>{const{db,ref,push}=window.__firebase;return push(ref(db,path),data);};
  const fbUpdate=async(path,data)=>{const{db,ref,update}=window.__firebase;return update(ref(db,path),data);};
  const fbRemove=async(path)=>{const{db,ref,remove}=window.__firebase;return remove(ref(db,path));};
  const fbSet=async(path,data)=>{const{db,ref,set}=window.__firebase;return set(ref(db,path),data);};

  const addTask=async()=>{
    if(!newTask.title.trim())return;
    setSaving(true);
    await fbAdd("tasks",{...newTask,status:"todo",note:"",createdAt:Date.now()});
    setNewTask(blankTask(newTask.memberId));
    setShowAdd(false);setSaving(false);
  };
  const updateStatus=async(fbId,s)=>fbUpdate(`tasks/${fbId}`,{status:s});
  const deleteTask=async(fbId)=>fbRemove(`tasks/${fbId}`);
  const saveNote=async(fbId)=>{await fbUpdate(`tasks/${fbId}`,{note:editNote});setEditNoteId(null);};
  const saveTaskEdit=async()=>{await fbUpdate(`tasks/${editTaskId}`,editTaskVal);setEditTaskId(null);};
  const archiveDone=async()=>{
    for(const t of tasks.filter(t=>t.status==="done")){
      await fbAdd("archived",{...t,archivedAt:Date.now()});
      await fbRemove(`tasks/${t.fbId}`);
    }
  };
  const restoreTask=async(task)=>{
    const{fbId,archivedAt,...rest}=task;
    await fbAdd("tasks",{...rest,status:"todo"});
    await fbRemove(`archived/${fbId}`);
  };
  const runCheckin=async()=>{
    for(const tk of tasks){
      if((tk.dueDate||tk.date)<checkinDate&&tk.status!=="done")
        await fbUpdate(`tasks/${tk.fbId}`,{status:"overdue"});
    }
  };

  const saveTeam=async()=>{await fbSet("team",teamDraft);setShowTeamEdit(false);};
  const removeMember=id=>setTeamDraft(d=>d.filter(m=>m.id!==id));
  const addMember=async()=>{
    if(!newMember.name.trim()||!newMember.role.trim())return;
    const cc=CARD_COLORS[newMember.colorIdx%CARD_COLORS.length];
    const bc=BADGE_COLORS[newMember.badgeIdx%BADGE_COLORS.length];
    await fbSet("team",[...team,{id:genId(),name:newMember.name.trim(),role:newMember.role.trim(),color:cc.color,border:cc.border,badgeColor:bc}]);
    setNewMember({name:"",role:"",colorIdx:0,badgeIdx:0});setShowAddMember(false);
  };

  const addAnnouncement=async()=>{
    if(!newAnnouncement.trim())return;
    await fbAdd("announcements",{text:newAnnouncement.trim(),author:currentUser,createdAt:Date.now()});
    setNewAnnouncement("");
  };
  const addPending=async()=>{
    if(!newPending.trim())return;
    await fbAdd("pending",{text:newPending.trim(),author:currentUser,createdAt:Date.now(),done:false});
    setNewPending("");
  };
  const togglePending=async(id,done)=>fbUpdate(`pending/${id}`,{done:!done});
  const deletePending=async(id)=>fbRemove(`pending/${id}`);
  const deleteAnnouncement=async(id)=>fbRemove(`announcements/${id}`);

  const saveOrder=next=>{setColOrder(next);localStorage.setItem(orderKey(currentUser),JSON.stringify(next));};
  const saveCollapsed=next=>{setCollapsedCols(next);localStorage.setItem(collapseKey(currentUser),JSON.stringify(next));};

  const toggleCollapse=id=>{
    const isCollapsed=collapsedCols.includes(id);
    if(!isCollapsed){
      saveCollapsed([...collapsedCols,id]);
      const cur=colOrder||team.map(m=>m.id);
      const next=cur.filter(x=>x!==id);next.push(id);
      saveOrder(next);
    } else {
      saveCollapsed(collapsedCols.filter(x=>x!==id));
    }
  };

  const onDragStart=(e,id)=>{dragRef.current=id;};
  const onDragOver=(e,id)=>{e.preventDefault();setDragOverId(id);};
  const onDrop=(e,targetId)=>{
    e.preventDefault();setDragOverId(null);
    if(!dragRef.current||dragRef.current===targetId)return;
    const cur=colOrder||team.map(m=>m.id);
    const from=cur.indexOf(dragRef.current),to=cur.indexOf(targetId);
    if(from<0||to<0)return;
    const next=[...cur];next.splice(from,1);next.splice(to,0,dragRef.current);
    saveOrder(next);
  };

  const orderedTeam=()=>{
    if(!colOrder)return team;
    const map=Object.fromEntries(team.map(m=>[m.id,m]));
    return [...colOrder.filter(id=>map[id]).map(id=>map[id]),...team.filter(m=>!colOrder.includes(m.id))];
  };
  const filteredByGroup=members=>{
    if(teamFilter==="drafting")return members.filter(m=>DRAFTING_ROLES.includes(m.role));
    if(teamFilter==="design")return members.filter(m=>DESIGN_ROLES.includes(m.role));
    return members;
  };
  const displayedTeam=()=>filteredByGroup(filterMember==="all"?orderedTeam():orderedTeam().filter(m=>m.id===filterMember));
  const visibleTasks=mid=>tasks.filter(t=>t.memberId===mid&&(filterMember==="all"||t.memberId===filterMember)).sort((a,b)=>{const p={high:0,medium:1,low:2};return(p[a.priority]-p[b.priority])||((a.dueDate||a.date||"").localeCompare(b.dueDate||b.date||""));});
  const allVisible=filterMember==="all"?tasks:tasks.filter(t=>t.memberId===filterMember);
  const stats={total:allVisible.length,done:allVisible.filter(t=>t.status==="done").length,overdue:allVisible.filter(t=>t.status==="overdue").length};
  const navBtn=(label,v)=><button onClick={()=>setView(v)} style={{padding:"7px 14px",borderRadius:999,fontSize:13,fontWeight:500,border:"none",background:view===v?"#7c3aed":"#f3f4f6",color:view===v?"#fff":"#4b5563"}}>{label}</button>;
  const groupBtn=(label,val,color)=><button onClick={()=>setTeamFilter(val)} style={{padding:"6px 14px",borderRadius:999,fontSize:12,fontWeight:600,border:`2px solid ${teamFilter===val?color:"#e5e7eb"}`,background:teamFilter===val?color:"#fff",color:teamFilter===val?"#fff":"#6b7280"}}>{label}</button>;

  if(!currentUser)return <LoginScreen onLogin={handleLogin}/>;
  if(!fbReady||!connected)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#f0f2f7",gap:16}}>
      <div style={{fontSize:32,display:"inline-block",animation:"spin 1s linear infinite"}}>⚙️</div>
      <div style={{fontWeight:700,fontSize:18,color:"#1f2937"}}>Connecting…</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:"#f0f2f7"}} className="fade-in">

      {/* Header */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"12px 20px",display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"space-between",gap:10,boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>🏠</span>
            <span style={{fontWeight:800,fontSize:18,color:"#1f2937"}}>True Legacy Homes</span>
            <span style={{fontSize:11,background:"#dcfce7",color:"#15803d",padding:"2px 8px",borderRadius:999,fontWeight:600}}>🟢 Live</span>
          </div>
          <div style={{fontSize:11,color:"#6b7280",marginTop:1}}>

                    <tr key={task.fbId} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#fafafa"}}>
                      <td style={{padding:"9px 12px"}}><div style={{color:task.status==="done"?"#9ca3af":"#1f2937",textDecoration:task.status==="done"?"line-through":"none"}}>{task.title}</div>{task.note&&<div style={{fontSize:11,color:"#9ca3af",fontStyle:"italic"}}>💬 {task.note}</div>}</td>
                      <td style={{padding:"9px 12px"}}><span style={{background:m?.badgeColor,color:"#fff",fontSize:11,padding:"2px 8px",borderRadius:999,fontWeight:600,whiteSpace:"nowrap"}}>{m?.name}</span></td>
                      <td style={{padding:"9px 12px",color:"#15803d",fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(task.startDate)}</td>
                      <td style={{padding:"9px 12px",color:"#a16207",fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(task.endDate)}</td>
                      <td style={{padding:"9px 12px",color:"#dc2626",fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(task.dueDate||task.date)}</td>
                      <td style={{padding:"9px 12px"}}><StatBadge s={task.status}/></td>
                      <td style={{padding:"9px 12px"}}><PRI p={task.priority}/></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            {tasks.length===0&&<p style={{textAlign:"center",color:"#9ca3af",padding:40}}>No tasks yet.</p>}
          </div>
        )}
      </div>

      {/* ARCHIVE MODAL */}
      {showArchive&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16}}>
          <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:720,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:17,color:"#1f2937"}}>🗂 Archived Tasks ({archivedTasks.length})</div>
              <button onClick={()=>setShowArchive(false)} style={{background:"#f3f4f6",border:"none",borderRadius:8,padding:"6px 12px",fontWeight:600,fontSize:13}}>Close</button>
            </div>
            {archivedTasks.length===0&&<p style={{textAlign:"center",color:"#9ca3af",padding:30}}>No archived tasks yet.</p>}
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f9fafb",borderBottom:"1px solid #e5e7eb"}}>{["Task","Assigned To","Due","Archived On",""].map((h,i)=><th key={i} style={{padding:"8px 10px",textAlign:"left",color:"#374151",fontWeight:600}}>{h}</th>)}</tr></thead>
              <tbody>
                {[...archivedTasks].sort((a,b)=>(b.archivedAt||0)-(a.archivedAt||0)).map((task,i)=>{
                  const m=team.find(x=>x.id===task.memberId);
                  return(
                    <tr key={task.fbId} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#fafafa"}}>
                      <td style={{padding:"8px 10px",color:"#6b7280",textDecoration:"line-through"}}>{task.title}</td>
                      <td style={{padding:"8px 10px"}}><span style={{background:m?.badgeColor||"#6b7280",color:"#fff",fontSize:11,padding:"2px 7px",borderRadius:999,fontWeight:600}}>{m?.name||"?"}</span></td>
                      <td style={{padding:"8px 10px",color:"#dc2626",fontSize:12}}>{fmtDate(task.dueDate||task.date)}</td>
                      <td style={{padding:"8px 10px",color:"#9ca3af",fontSize:12}}>{fmtDateTime(task.archivedAt)}</td>
                      <td style={{padding:"8px 10px"}}>{isManager&&<button onClick={()=>restoreTask(task)} style={{fontSize:11,padding:"4px 10px",borderRadius:6,border:"none",background:"#dcfce7",color:"#15803d",fontWeight:600}}>↩ Restore to To Do</button>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ASSIGN MODAL */}
      {showAdd&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16}}>
          <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:460,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{fontWeight:700,fontSize:17,color:"#1f2937",marginBottom:14}}>Assign Task</div>
            {lbl("Assign To")}<select value={newTask.memberId} onChange={e=>setNewTask(n=>({...n,memberId:e.target.value}))} style={{marginBottom:10}}>{team.map(m=><option key={m.id} value={m.id}>{m.name} – {m.role}</option>)}</select>
            {lbl("Task Description")}<input value={newTask.title} onChange={e=>setNewTask(n=>({...n,title:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="Describe the task…" style={{marginBottom:10}}/>
            {lbl("Priority")}<select value={newTask.priority} onChange={e=>setNewTask(n=>({...n,priority:e.target.value}))} style={{marginBottom:10}}><option value="high">🔴 High</option><option value="medium">🟡 Medium</option><option value="low">🟢 Low</option></select>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
              <div>{lbl("📅 Start")}<input type="date" value={newTask.startDate} onChange={e=>setNewTask(n=>({...n,startDate:e.target.value}))}/></div>
              <div>{lbl("📅 End")}<input type="date" value={newTask.endDate} onChange={e=>setNewTask(n=>({...n,endDate:e.target.value}))}/></div>
              <div>{lbl("🔴 Due")}<input type="date" value={newTask.dueDate} onChange={e=>setNewTask(n=>({...n,dueDate:e.target.value}))}/></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addTask} disabled={!newTask.title.trim()||saving} style={{flex:1,padding:"10px 0",background:"#7c3aed",color:"#fff",border:"none",borderRadius:10,fontWeight:600,opacity:newTask.title.trim()&&!saving?1:.4}}>{saving?"Saving…":"Assign Task"}</button>
              <button onClick={()=>{setShowAdd(false);setNewTask(blankTask());}} style={{flex:1,padding:"10px 0",background:"#f3f4f6",color:"#4b5563",border:"none",borderRadius:10,fontWeight:600}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* TEAM EDIT MODAL */}
      {showTeamEdit&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50,padding:16}}>
          <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{fontWeight:700,fontSize:17,color:"#1f2937",marginBottom:4}}>👤 Edit Team Members</div>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:16}}>Changes sync for everyone instantly.</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {teamDraft.map((m,i)=>(
                <div key={m.id} style={{display:"flex",gap:8,alignItems:"center",background:"#f9fafb",borderRadius:10,padding:"10px 12px",borderLeft:`4px solid ${m.badgeColor}`}}>
                  <div style={{flex:1,display:"flex",gap:8,flexWrap:"wrap"}}>
                    <input value={m.name} onChange={e=>{const d=[...teamDraft];d[i]={...d[i],name:e.target.value};setTeamDraft(d);}} placeholder="Name" style={{flex:1,minWidth:100,fontSize:13,padding:"5px 8px",borderRadius:6,border:"1px solid #d1d5db"}}/>
                    <input value={m.role} onChange={e=>{const d=[...teamDraft];d[i]={...d[i],role:e.target.value};setTeamDraft(d);}} placeholder="Role" style={{flex:1,minWidth:120,fontSize:13,padding:"5px 8px",borderRadius:6,border:"1px solid #d1d5db"}}/>
                  </div>
                  <button onClick={()=>removeMember(m.id)} style={{background:"#fee2e2",border:"none",borderRadius:6,padding:"4px 8px",color:"#dc2626",fontSize:12,fontWeight:600}}>Remove</button>
                </div>
              ))}
            </div>
            <button onClick={()=>setShowAddMember(true)} style={{width:"100%",marginTop:10,padding:"8px",borderRadius:8,border:"2px dashed #d1d5db",color:"#7c3aed",background:"none",fontWeight:600,fontSize:13}}>+ Add New Member</button>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={saveTeam} style={{flex:1,padding:"10px 0",background:"#7c3aed",color:"#fff",border:"none",borderRadius:10,fontWeight:600}}>Save Changes</button>
              <button onClick={()=>setShowTeamEdit(false)} style={{flex:1,padding:"10px 0",background:"#f3f4f6",color:"#4b5563",border:"none",borderRadius:10,fontWeight:600}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD MEMBER MODAL */}
      {showAddMember&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60,padding:16}}>
          <div style={{background:"#fff",borderRadius:20,padding:24,width:"100%",maxWidth:420,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:14}}>➕ Add New Member</div>
            {lbl("Name")}<input value={newMember.name} onChange={e=>setNewMember(n=>({...n,name:e.target.value}))} placeholder="Full name" style={{marginBottom:10}}/>
            {lbl("Role")}<input value={newMember.role} onChange={e=>setNewMember(n=>({...n,role:e.target.value}))} placeholder="e.g. Drafter, Designer…" style={{marginBottom:10}}/>
            {lbl("Card Color")}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{CARD_COLORS.map((cc,idx)=><div key={idx} onClick={()=>setNewMember(n=>({...n,colorIdx:idx}))} style={{width:28,height:28,borderRadius:999,background:cc.color,border:`3px solid ${newMember.colorIdx===idx?cc.border:"transparent"}`,cursor:"pointer"}}/>)}</div>
            {lbl("Badge Color")}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>{BADGE_COLORS.map((bc,idx)=><div key={idx} onClick={()=>setNewMember(n=>({...n,badgeIdx:idx}))} style={{width:28,height:28,borderRadius:999,background:bc,border:`3px solid ${newMember.badgeIdx===idx?"#1f2937":"transparent"}`,cursor:"pointer"}}/>)}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addMember} disabled={!newMember.name.trim()||!newMember.role.trim()} style={{flex:1,padding:"10px 0",background:"#7c3aed",color:"#fff",border:"none",borderRadius:10,fontWeight:600,opacity:newMember.name.trim()&&newMember.role.trim()?1:.4}}>Add Member</button>
              <button onClick={()=>setShowAddMember(false)} style={{flex:1,padding:"10px 0",background:"#f3f4f6",color:"#4b5563",border:"none",borderRadius:10,fontWeight:600}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
